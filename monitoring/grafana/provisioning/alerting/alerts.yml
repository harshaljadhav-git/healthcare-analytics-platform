# =============================================================
# Grafana Alerting Provisioning — PulseStream Healthcare
# =============================================================

apiVersion: 1

# ---------------------------------------------------------
# Contact Points — Where alerts are sent
# ---------------------------------------------------------
contactPoints:
  - orgId: 1
    name: pulsestream-email-alerts
    receivers:
      - uid: email-receiver-1
        type: email
        settings:
          addresses: "${GF_ALERTING_EMAIL_TO}"
          singleEmail: true
        disableResolveMessage: false

# ---------------------------------------------------------
# Notification Policies — Route all alerts to email
# ---------------------------------------------------------
policies:
  - orgId: 1
    receiver: pulsestream-email-alerts
    group_by:
      - grafana_folder
      - alertname
    group_wait: 10s
    group_interval: 1m
    repeat_interval: 4h

# ---------------------------------------------------------
# Alert Rules — Health monitoring
# ---------------------------------------------------------
groups:
  - orgId: 1
    name: PulseStream Infrastructure Health
    folder: PulseStream Alerts
    interval: 10s
    rules:
      # =====================================================
      # ALERT: PostgreSQL RDS is DOWN
      # =====================================================
      - uid: alert-postgres-down
        title: "PostgreSQL RDS is DOWN"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: healthcare_postgres_up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
        noDataState: Alerting
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "PostgreSQL RDS database is unreachable from PulseStream engine."
          description: "The healthcare_postgres_up metric dropped to 0. Immediate investigation required."
        labels:
          severity: critical
          service: postgresql-rds

      # =====================================================
      # ALERT: Databricks SQL Warehouse is DOWN
      # =====================================================
      - uid: alert-databricks-down
        title: "Databricks SQL Warehouse is DOWN"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: healthcare_databricks_up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
        noDataState: Alerting
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "Databricks SQL Warehouse is unreachable from PulseStream engine."
          description: "The healthcare_databricks_up metric dropped to 0. Check Databricks console."
        labels:
          severity: warning
          service: databricks

      # =====================================================
      # ALERT: PulseStream Application is DOWN
      # =====================================================
      - uid: alert-app-down
        title: "PulseStream Application is DOWN"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: up{job="pulsestream-engine"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
        noDataState: Alerting
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "PulseStream Healthcare application is unreachable."
          description: "Prometheus cannot scrape /metrics. The application container may have crashed."
        labels:
          severity: critical
          service: pulsestream-app
